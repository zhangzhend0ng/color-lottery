<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>颜色检测器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 100vw; height: 100vh; overflow: hidden;
    background: #000; font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    display: flex; flex-direction: column;
  }

  #video-container {
    flex: 1; position: relative; overflow: hidden;
  }
  video {
    width: 100%; height: 100%; object-fit: cover;
    transform: scaleX(-1);
  }

  #roi {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 150px; height: 150px;
    border: 3px solid #00ff00;
    border-radius: 12px;
    box-shadow: 0 0 20px rgba(0,255,0,0.3);
    pointer-events: none;
  }

  #result {
    position: absolute; bottom: 60px; left: 0; right: 0;
    text-align: center;
  }
  #result-bar {
    display: inline-block;
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 18px; font-weight: 700;
    background: rgba(0,0,0,0.7);
    color: white;
    backdrop-filter: blur(8px);
  }

  /* Start overlay */
  #start-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
  }
  #start-btn {
    padding: 16px 48px;
    font-size: 20px; font-weight: 700;
    background: #4488FF; color: white;
    border: none; border-radius: 12px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  #start-btn:active { background: #2960CC; }
  #start-hint {
    color: #888; font-size: 14px; margin-top: 16px;
  }

  /* Bottom controls */
  #controls {
    padding: 12px 16px; background: #111;
    display: flex; align-items: center; gap: 12px;
  }
  #server-input {
    flex: 1; padding: 10px 12px;
    border: 1px solid #333; border-radius: 8px;
    background: #1a1a1a; color: white; font-size: 14px;
    outline: none;
  }
  #server-input:focus { border-color: #4488FF; }
  #status {
    font-size: 13px; color: #888;
    white-space: nowrap;
  }
  #status.connected { color: #44CC44; }
  #status.camera-ready { color: #FFCC00; }
  #last-sent {
    font-size: 12px; color: #666;
    padding: 4px 0;
  }
</style>
</head>
<body>

<div id="video-container">
  <video id="cam" autoplay playsinline muted></video>
  <div id="roi"></div>

  <div id="start-overlay">
    <button id="start-btn">开启摄像头</button>
    <div id="start-hint"></div>
  </div>

  <div id="result">
    <div id="result-bar" style="opacity:0.6">
      <span id="color-name">等待检测...</span>
    </div>
  </div>
</div>

<div id="last-sent"></div>
<div id="controls">
  <input id="server-input" type="text" placeholder="服务器地址 (如 192.168.1.50:5000)" value="localhost:5000">
  <span id="status">● 未连接</span>
</div>

<canvas id="hidden-canvas" width="150" height="150" style="display:none"></canvas>

<script>
var COLOR_REFS = [
  { name: "gold",   h: 48,  sMin: 60, sMax: 100, vMin: 60, vMax: 100, dot: "#FFD700", label: "SSR" },
  { name: "red",    h: 0,   sMin: 50, sMax: 100, vMin: 30, vMax: 100, dot: "#FF4444", label: "SR" },
  { name: "blue",   h: 210, sMin: 40, sMax: 100, vMin: 25, vMax: 100, dot: "#4488FF", label: "R" },
  { name: "green",  h: 120, sMin: 30, sMax: 100, vMin: 20, vMax: 100, dot: "#44CC44", label: "N" },
  { name: "yellow", h: 54,  sMin: 50, sMax: 100, vMin: 70, vMax: 100, dot: "#FFCC00", label: "R" },
  { name: "white",  h: 0,   sMin: 0,  sMax: 15,  vMin: 70, vMax: 100, dot: "#CCCCCC", label: "N" },
];

var DEBOUNCE_FRAMES = 15;
var COOLDOWN_MS = 5000;

var currentColor = null;
var streak = 0;
var lastTrigger = 0;
var serverBase = "localhost:5000";
var detecting = false;

var video = document.getElementById("cam");
var statusEl = document.getElementById("status");
var colorNameEl = document.getElementById("color-name");
var resultBar = document.getElementById("result-bar");
var lastSentEl = document.getElementById("last-sent");
var serverInput = document.getElementById("server-input");
var startBtn = document.getElementById("start-btn");
var startHint = document.getElementById("start-hint");
var startOverlay = document.getElementById("start-overlay");

serverInput.addEventListener("input", function() {
  serverBase = this.value.trim() || "localhost:5000";
});

// --- Start camera on button tap (required by mobile browsers) ---
startBtn.addEventListener("click", function() {
  startBtn.textContent = "正在开启...";
  startBtn.disabled = true;
  startHint.textContent = "";

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment", width: { ideal: 640 }, height: { ideal: 480 } },
    audio: false
  })
  .then(function(stream) {
    video.srcObject = stream;
    video.play();
    startOverlay.style.display = "none";
    statusEl.textContent = "● 摄像头就绪";
    statusEl.className = "camera-ready";
    detecting = true;
    requestAnimationFrame(detectLoop);
  })
  .catch(function(err) {
    startBtn.textContent = "重试";
    startBtn.disabled = false;
    if (err.name === "NotAllowedError") {
      startHint.textContent = "请允许摄像头权限后重试";
    } else if (err.name === "NotFoundError") {
      startHint.textContent = "未检测到摄像头";
    } else if (err.name === "NotReadableError") {
      startHint.textContent = "摄像头被占用，请关闭其他应用";
    } else {
      startHint.textContent = err.name + " - 请使用 HTTPS 访问";
    }
  });
});

// --- Color detection ---
function rgbToHsv(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  var max = Math.max(r, g, b), min = Math.min(r, g, b);
  var h, s, v = max;
  var d = max - min;
  s = max === 0 ? 0 : d / max;
  if (max === min) { h = 0; }
  else {
    switch (max) {
      case r: h = (g - b) / d + (g < b ? 6 : 0); break;
      case g: h = (b - r) / d + 2; break;
      case b: h = (r - g) / d + 4; break;
    }
    h /= 6;
  }
  return [h * 360, s * 100, v * 100];
}

function matchColor(meanHsv) {
  var h = meanHsv[0], s = meanHsv[1], v = meanHsv[2];
  var best = null, bestScore = Infinity;
  for (var i = 0; i < COLOR_REFS.length; i++) {
    var ref = COLOR_REFS[i];
    var dh = Math.abs(h - ref.h);
    if (dh > 180) dh = 360 - dh;
    var sOk = s >= ref.sMin && s <= ref.sMax;
    var vOk = v >= ref.vMin && v <= ref.vMax;
    var score = dh;
    if (!sOk) score += 50;
    if (!vOk) score += 50;
    if (score < bestScore) { bestScore = score; best = ref; }
  }
  return best;
}

function detectLoop() {
  if (!detecting) return;
  var canvas = document.getElementById("hidden-canvas");
  var ctx = canvas.getContext("2d");
  var vw = video.videoWidth, vh = video.videoHeight;
  if (vw === 0) { requestAnimationFrame(detectLoop); return; }

  var sx = vw / 2 - 75, sy = vh / 2 - 75;
  ctx.drawImage(video, sx, sy, 150, 150, 0, 0, 150, 150);
  var imageData = ctx.getImageData(0, 0, 150, 150);
  var pixels = imageData.data;

  var rSum = 0, gSum = 0, bSum = 0, count = 0;
  for (var y = 25; y < 125; y++) {
    for (var x = 25; x < 125; x++) {
      var idx = (y * 150 + x) * 4;
      rSum += pixels[idx]; gSum += pixels[idx + 1]; bSum += pixels[idx + 2];
      count++;
    }
  }
  var meanR = rSum / count, meanG = gSum / count, meanB = bSum / count;
  var hsv = rgbToHsv(meanR, meanG, meanB);
  var matched = matchColor(hsv);

  colorNameEl.textContent = matched.label + " " + matched.name;
  resultBar.style.opacity = "0.85";

  if (matched.name === currentColor) { streak++; }
  else { currentColor = matched.name; streak = 1; }

  var now = Date.now();
  if (streak >= DEBOUNCE_FRAMES && (now - lastTrigger) > COOLDOWN_MS) {
    sendResult(matched);
    lastTrigger = now;
  }

  requestAnimationFrame(detectLoop);
}

// --- Send to server ---
var mappingCache = null;

function loadMapping(callback) {
  if (mappingCache) { callback(mappingCache); return; }
  var xhr = new XMLHttpRequest();
  xhr.open("GET", "https://" + serverBase + "/api/mapping", true);
  xhr.timeout = 3000;
  xhr.onload = function() {
    if (xhr.status === 200) {
      try { mappingCache = JSON.parse(xhr.responseText); } catch(e) {}
    }
    callback(mappingCache);
  };
  xhr.onerror = function() { callback(null); };
  xhr.send();
}

function sendResult(matched) {
  loadMapping(function(mapping) {
    var prize = mapping && mapping[matched.name]
      ? mapping[matched.name]
      : { prize: matched.label + " " + matched.name, emoji: "●", type: matched.label === "SSR" ? "ssr" : "r" };

    var payload = {
      color: matched.name,
      prize: prize.prize,
      emoji: prize.emoji,
      type: prize.type,
      confidence: 0.85
    };

    var xhr = new XMLHttpRequest();
    xhr.open("POST", "https://" + serverBase + "/api/detect", true);
    xhr.setRequestHeader("Content-Type", "application/json");
    xhr.timeout = 3000;
    xhr.onload = function() {
      if (xhr.status === 200) {
        statusEl.textContent = "● 已连接";
        statusEl.className = "connected";
        var now = new Date();
        lastSentEl.textContent = "发送: " + prize.prize
          + " (" + now.getHours().toString().padStart(2,"0") + ":"
          + now.getMinutes().toString().padStart(2,"0") + ":"
          + now.getSeconds().toString().padStart(2,"0") + ")";
      }
    };
    xhr.onerror = function() {
      statusEl.textContent = "● 服务器无响应";
      statusEl.className = "";
    };
    xhr.send(JSON.stringify(payload));
  });
}
</script>
</body>
</html>
